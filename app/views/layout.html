<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Age Kiosk{% endblock %}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-b" aria-hidden="true"></div>

  <header class="topbar topbar-row">
    <div class="brand-block">
      <h1>AI 年齡驗證系統</h1>
      <p>即時辨識，不儲存影像；僅用於當下年齡驗證。</p>
    </div>

    <nav class="top-nav" aria-label="頁面切換">
      <a
        class="top-nav-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}"
        href="{{ url_for('main.dashboard') }}"
      >
        <svg class="top-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5h7A2.5 2.5 0 0 1 15 7.5v9A2.5 2.5 0 0 1 12.5 19h-7A2.5 2.5 0 0 1 3 16.5z" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <path d="M15 10l5-3v10l-5-3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
        <span>監控</span>
      </a>

      <a
        class="top-nav-link {% if request.endpoint == 'main.monitor' %}active{% endif %}"
        href="{{ url_for('main.monitor') }}"
      >
        <svg class="top-nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 20h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <rect x="5.5" y="12" width="3.5" height="6" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <rect x="10.25" y="9" width="3.5" height="9" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <rect x="15" y="6" width="3.5" height="12" fill="none" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        <span>儀表板</span>
      </a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <small>隱私聲明：本系統僅即時辨識，不儲存個人影像資料。</small>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
