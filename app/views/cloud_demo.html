{% extends "layout.html" %}

{% block title %}Age Kiosk Cloud Demo{% endblock %}

{% block content %}
<section class="grid cloud-grid">
  <article class="panel video-panel">
    <div class="panel-head">
      <h2>雲端鏡頭</h2>
      <span id="cam-chip" class="chip chip-soft">IDLE</span>
    </div>

    <div class="stream-wrap">
      <video id="cloud-video" playsinline autoplay muted></video>
    </div>

    <div class="cloud-actions">
      <button id="btn-start" type="button">啟動鏡頭</button>
      <button id="btn-stop" type="button" class="btn-secondary">停止鏡頭</button>
      <button id="btn-shot" type="button" class="btn-secondary">立即推論</button>
    </div>

    <p id="cloud-status" class="hint">等待啟動鏡頭</p>
    <canvas id="cloud-canvas" class="hidden-canvas"></canvas>
  </article>

  <article class="panel status-panel">
    <div class="panel-head">
      <h2>雲端推論</h2>
      <span id="provider-chip" class="chip chip-soft">--</span>
    </div>

    <dl class="status-list">
      <div><dt>偵測人數</dt><dd id="face-count">--</dd></div>
      <div><dt>AI 年齡</dt><dd id="ai-age">--</dd></div>
      <div><dt>顯示區間</dt><dd id="ai-range">--</dd></div>
      <div><dt>決策代碼</dt><dd id="decision-code">--</dd></div>
      <div><dt>決策結果</dt><dd id="decision-label">--</dd></div>
      <div><dt>需人工複核</dt><dd id="manual-verify">--</dd></div>
      <div><dt>訊息</dt><dd id="result-msg">--</dd></div>
    </dl>
  </article>
</section>

<script>
  window.AGE_KIOSK_CLOUD_CONFIG = {
    healthApi: "{{ cloud_health_api }}",
    inferApi: "{{ cloud_infer_api }}",
    inferIntervalMs: {{ infer_interval_ms }}
  };
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/cloud_demo.js') }}"></script>
{% endblock %}
